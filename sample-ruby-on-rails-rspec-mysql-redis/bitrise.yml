format_version: "25"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: ruby
containers:
  mysql:
    type: service
    image: mysql:8
    ports:
      - 3306:3306
    envs:
      - MYSQL_ROOT_PASSWORD: $DB_PASSWORD
      - MYSQL_DATABASE: sample_ruby_on_rails_rspec_mysql_redis_test
    options: --health-cmd "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD" --health-interval 10s --health-timeout 5s --health-retries 5
  redis:
    type: service
    image: redis:7
    ports:
      - 6379:6379
    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
app:
  envs:
    - DB_HOST: mysql
    - DB_USERNAME: root
    - DB_PASSWORD: password
    - REDIS_URL: redis://redis:6379/0
workflows:
  run_tests:
    steps:
      - activate-ssh-key: {}
      - git-clone: {}
      - script:
          title: Install Ruby
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -euxo pipefail

                asdf install ruby
      - restore-cache:
          inputs:
            - key: gem-{{ checksum "Gemfile.lock" }}
      - script:
          title: Install dependencies
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -euxo pipefail

                bundle config set --local path vendor/bundle
                bundle install
      - script:
          title: Database setup
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euxo pipefail

                bundle exec rake db:create db:schema:load
          service_containers:
            - mysql
      - script:
          title: Run tests
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euxo pipefail

                bundle exec rspec
          service_containers:
            - mysql
            - redis
      - save-cache:
          inputs:
            - key: gem-{{ checksum "Gemfile.lock" }}
            - paths: vendor/bundle
      - deploy-to-bitrise-io: {}
